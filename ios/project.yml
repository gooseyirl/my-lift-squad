name: MyLiftSquad
options:
  bundleIdPrefix: com.gooseco
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "6"
    PRODUCT_BUNDLE_IDENTIFIER: com.gooseco.myliftsquad
    INFOPLIST_FILE: MyLiftSquad/Resources/Info.plist
    DEVELOPMENT_TEAM: "RG72PZGLF9"

targets:
  MyLiftSquadTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MyLiftSquadTests
    dependencies:
      - target: MyLiftSquad
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"

  MyLiftSquad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MyLiftSquad/Sources
      - path: MyLiftSquad/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gooseco.myliftsquad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "MyLiftSquad AppStore Distribution"
    info:
      path: MyLiftSquad/Resources/Info.plist
      properties:
        CFBundleDisplayName: My Lift Squad
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            openpowerlifting.org:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
